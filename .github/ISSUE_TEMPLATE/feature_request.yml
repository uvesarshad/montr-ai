name: Feature request
description: Propose an enhancement to the MontrAI fair-code core.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Please search existing issues and discussions first.
        Note: MontrAI is **fair-code / source-available** under the Sustainable
        Use License. Contributions to the public core must not add
        commercial-overlay (multi-tenant / hosted-only) functionality.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve? Who is affected and how often?
      placeholder: As a self-hoster, I cannot ... because ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you would like. Sketch the UX/API if relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you evaluated, and why you ruled them out.

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - "Unsure"
        - "Agent (goal -> strategy -> missions)"
        - "CRM"
        - "Social"
        - "WhatsApp"
        - "Inbox"
        - "Campaigns / Email"
        - "AI Studio"
        - "Canvas / Workflows"
        - "Forms / Docs"
        - "Analytics"
        - "Voice"
        - "Connections / OAuth / AI router"
        - "Workers / runtime / server"
        - "Docs / setup / Docker"
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Scope
      options:
        - label: I searched existing issues/discussions and this is not a duplicate.
          required: true
        - label: This belongs in the public core (it is not hosted/multi-tenant-only commercial-overlay functionality).
          required: true
        - label: I am willing to help implement or test this.
          required: false
