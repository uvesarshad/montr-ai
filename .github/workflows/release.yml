name: Release (GHCR image)

# Build the MontrAI self-host image and publish it to the GitHub Container
# Registry (ghcr.io/<owner>/montr-ai) on every semver tag.
#
# Trigger:
#   * push a tag matching v*.*.*  (e.g. `git tag v1.2.0 && git push origin v1.2.0`)
#   * or run manually from the Actions tab (workflow_dispatch) to rebuild :latest
#     from the default branch without cutting a new tag.
#
# Auth: uses the built-in GITHUB_TOKEN with `packages: write` — NO external
# secrets, no registry password, nothing to configure. The token is scoped to
# this repo's owner, so the package lands under the same org/user automatically.
#
# Output tags: the full semver (vX.Y.Z), the major.minor + major shorthands,
# and `latest`. On workflow_dispatch only `latest` (+ the run sha) is moved.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

# Don't pile up image builds for the same ref.
concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: read the source, write packages (push to GHCR).
permissions:
  contents: read
  packages: write

env:
  # Image repository. github.repository_owner keeps this correct whether the
  # repo lives under an org or a personal account; lower-cased because GHCR
  # rejects upper-case path segments. The image name is fixed to `montr-ai`.
  REGISTRY: ghcr.io
  IMAGE_NAME: montr-ai

jobs:
  build-and-push:
    name: Build + push image to GHCR
    runs-on: ubuntu-latest
    # -------------------------------------------------------------------------
    # ⚠️ HEAP / OOM RISK — read before launch:
    # The `builder` stage runs `next build` with NODE_OPTIONS=--max-old-space-size=8192
    # (~8 GB heap; baked into the Dockerfile). GitHub-hosted `ubuntu-latest`
    # runners have only ~7 GB of usable RAM, so a large build can OOM-kill the
    # Node process ("JavaScript heap out of memory" / exit 137) here even though
    # it succeeds on the maintainer's box.
    #
    # If this job dies with 137 / OOM, pick ONE of:
    #   (a) Bigger runner — switch `runs-on` to a GitHub larger runner
    #       (e.g. `ubuntu-latest-8-cores`, 32 GB) or a self-hosted runner. This
    #       is the recommended fix; the 8 GB heap then has real headroom.
    #   (b) Lower the heap to fit ~7 GB — pass a build-arg that overrides
    #       NODE_OPTIONS for the builder stage, e.g. under `build-push-action`:
    #         build-args: |
    #           EXTRA_NODE_OPTIONS=--max-old-space-size=6144
    #       (EXTRA_NODE_OPTIONS is appended after the Dockerfile's 8192 default,
    #        and the LAST --max-old-space-size wins, so this caps it at ~6 GB.)
    #   (c) Add swap on the runner before building (slower but free), e.g.
    #       a step that runs: sudo fallocate -l 8G /swap && sudo mkswap /swap && sudo swapon /swap
    # -------------------------------------------------------------------------
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # buildx = the BuildKit-backed builder build-push-action drives.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to GHCR with the built-in token. No external secret needed.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive tags + OCI labels. On a v*.*.* tag this emits the full semver,
      # major.minor, major, and `latest`. On workflow_dispatch it emits the
      # branch name + short sha (and `latest` only on the default branch).
      - name: Compute image tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          # Force `latest` on every semver tag too (metadata-action's default
          # only marks latest for the highest semver, which it can't know in a
          # single-tag run). On tag pushes this guarantees :latest moves.
          flavor: |
            latest=auto

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub-hosted runners cache layers between runs via the GHA cache.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # If you hit the ~7 GB OOM described above and can't move to a larger
          # runner, uncomment to cap the builder heap below the runner ceiling:
          # build-args: |
          #   EXTRA_NODE_OPTIONS=--max-old-space-size=6144
