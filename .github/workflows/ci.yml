name: CI

# Public-repo CI for the MontrAI fair-code core.
# Required pipeline (fail-fast, in order): lint → typecheck → test (vitest) →
# secret-scan (gitleaks) → overlay-boundary guard. Any red job blocks merge.
# NO deploy secrets live here — deployment is handled out-of-band
# (see .github/workflows-disabled/deploy.yml on the private surface).

on:
  pull_request:
  push:
    branches:
      - main

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default. Gitleaks needs read access to fetch history.
permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  lint:
    name: Lint (eslint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: Typecheck (tsc --noEmit)
    runs-on: ubuntu-latest
    # Gate behind lint so a basic-hygiene failure short-circuits the pipeline.
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run TypeScript typecheck
        run: npm run typecheck

  test:
    name: Unit tests (vitest)
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run vitest
        run: npm run test

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan every commit on the PR/branch.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Explicit config = the committed allowlist (audited false positives).
          # gitleaks-action also auto-discovers <repo-root>/.gitleaks.toml, but
          # pin it so the gate can never silently fall back to bare defaults.
          GITLEAKS_CONFIG: .gitleaks.toml
          # No GITLEAKS_LICENSE needed for public repos.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  overlay-boundary:
    name: Overlay-boundary guard (G5)
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assert no commercial/overlay code in the public core
        run: |
          set -euo pipefail
          fail=0

          # G5: the public core must never statically import an overlay/commercial path.
          if grep -RInE "from ['\"](@overlay/|\.{1,}(/\.\.)*/overlay/|overlay/)" \
               --include='*.ts' --include='*.tsx' --include='*.js' --include='*.mjs' \
               src 2>/dev/null; then
            echo "::error::Public core imports an overlay/commercial path — overlay-boundary guard (G5) failed."
            fail=1
          fi

          # The commercial overlay (ee/billing/gateway) is private — it must not
          # appear in the public tree.
          for d in ee overlay src/overlay packages/overlay; do
            if [ -d "$d" ]; then
              echo "::error::Commercial/overlay directory '$d' present in public tree — not allowed in the OSS core."
              fail=1
            fi
          done

          if [ "$fail" -ne 0 ]; then
            exit 1
          fi
          echo "Overlay-boundary guard passed — public core is clean."

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # TODO(C3): the test lane fills this in — Playwright E2E against a
      # docker-compose-up smoke stack (first-run, WOW agent bridge, social
      # publish, CRM, inbox). Until `test:e2e` exists this lane is a no-op
      # so the required-check name is stable and reviewers see the slot.
      - name: E2E placeholder
        run: echo "E2E suite not wired yet — tracked by C3 in the OSS execution plan."
