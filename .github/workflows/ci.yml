name: CI

# Public-repo CI for the MontrAI fair-code core.
# Lanes: lint, typecheck, test (vitest), secret-scan (gitleaks).
# NO deploy secrets live here — deployment is handled out-of-band
# (see .github/workflows-disabled/deploy.yml on the private surface).

on:
  pull_request:
  push:
    branches:
      - main

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default. Gitleaks needs read access to fetch history.
permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  lint:
    name: Lint (eslint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: Typecheck (tsc --noEmit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript typecheck
        run: npm run typecheck

  test:
    name: Unit tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run vitest
        run: npm run test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # TODO(C3): the test lane fills this in — Playwright E2E against a
      # docker-compose-up smoke stack (first-run, WOW agent bridge, social
      # publish, CRM, inbox). Until `test:e2e` exists this lane is a no-op
      # so the required-check name is stable and reviewers see the slot.
      - name: E2E placeholder
        run: echo "E2E suite not wired yet — tracked by C3 in the OSS execution plan."

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan every commit on the PR/branch.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # No GITLEAKS_LICENSE needed for public repos.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
