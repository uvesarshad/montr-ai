name: CI

# Public-repo CI for the MontrAI fair-code core.
# Required pipeline (fail-fast, in order): lint → typecheck → test (vitest) →
# secret-scan (gitleaks) → overlay-boundary guard → license-header check. Any red
# job blocks merge. These are the master-plan §3.6 HARD GATES the AI maintainer
# enforces (see docs/MAINTAINER-AGENT.md). NO deploy secrets live here —
# deployment is handled out-of-band (see .github/workflows-disabled/deploy.yml on
# the private surface).

on:
  pull_request:
  push:
    branches:
      - main

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default. Gitleaks needs read access to fetch history.
permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  lint:
    name: Lint (eslint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: Typecheck (tsc --noEmit)
    runs-on: ubuntu-latest
    # Gate behind lint so a basic-hygiene failure short-circuits the pipeline.
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run TypeScript typecheck
        run: npm run typecheck

  test:
    name: Unit tests (vitest)
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run vitest
        run: npm run test

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan every commit on the PR/branch.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Explicit config = the committed allowlist (audited false positives).
          # gitleaks-action also auto-discovers <repo-root>/.gitleaks.toml, but
          # pin it so the gate can never silently fall back to bare defaults.
          GITLEAKS_CONFIG: .gitleaks.toml
          # No GITLEAKS_LICENSE needed for public repos.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  overlay-boundary:
    name: Overlay-boundary guard (G5)
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the guard can diff the PR base..head range.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Fails the PR if it ADDS a file under a commercial/overlay path (the carve
      # delete-manifest: (admin)/**, api/v2/admin/**, razorpay/**, white-label, …)
      # or ADDS an import reaching into an overlay-only surface. Forbidden set lives
      # in the script (self-contained — the emit pipeline scrubs the generator).
      - name: Overlay-boundary guard (scripts/ci/overlay-boundary-check.mjs)
        run: node scripts/ci/overlay-boundary-check.mjs
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

  license-header:
    name: License-header check (G6)
    runs-on: ubuntu-latest
    needs: overlay-boundary
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the check can diff the PR base..head range.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Fails the PR if any NEWLY ADDED source file under src/ is missing the
      # fair-code SUL license header (CONTRIBUTING.md §4). Scoped to added files —
      # never retroactively fails the pre-convention back-catalogue.
      - name: License-header check (scripts/ci/license-header-check.mjs)
        run: node scripts/ci/license-header-check.mjs
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # TODO(C3): the test lane fills this in — Playwright E2E against a
      # docker-compose-up smoke stack (first-run, WOW agent bridge, social
      # publish, CRM, inbox). Until `test:e2e` exists this lane is a no-op
      # so the required-check name is stable and reviewers see the slot.
      - name: E2E placeholder
        run: echo "E2E suite not wired yet — tracked by C3 in the OSS execution plan."
